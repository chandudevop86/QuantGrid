services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-quantgrid-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-quantgrid}
    ports:
      - "5432:5432"
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - services/trading-service/.env
    environment:
      QUANTGRID_ENV: ${QUANTGRID_ENV:-local}
      QUANTGRID_AUTH_SECRET: ${QUANTGRID_AUTH_SECRET:-local-dev-auth-secret-at-least-32-characters}
      QUANTGRID_ALLOW_DEV_SEED_USERS: ${QUANTGRID_ALLOW_DEV_SEED_USERS:-true}
      QUANTGRID_USERS: ${QUANTGRID_USERS:-admin:AdminPass1!:admin}
      ALLOW_SAMPLE_MARKET_DATA: ${ALLOW_SAMPLE_MARKET_DATA:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://quant:local-quantgrid-postgres@postgres:5432/quantgrid}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JOB_STORE_DB_FILE: /app/data/dashboard_jobs.sqlite3
      MARKET_DATA_DB_FILE: /app/data/market_data.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - app_backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000/ws}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:5173', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  app_postgres_data:
  app_backend_data:
