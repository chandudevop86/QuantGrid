name: Security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  devsecops-security:
    name: DevSecOps security gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/trading-service/requirements.txt
          pip install pip-audit bandit

      - name: Dependency scanning
        run: pip-audit -r services/trading-service/requirements.txt

      - name: Static application security scan
        run: bandit -q -r services/trading-service -x "*/tests/*"

      - name: Block checked-in secrets and default credentials
        run: python scripts/check_no_secrets.py

      - name: Unit tests
        env:
          QUANTGRID_AUTH_SECRET: ci-secret-value-that-is-long-enough-12345
          QUANTGRID_ENV: local
        run: python -m pytest tests

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform fmt
        run: terraform fmt -check -recursive infra/terraform

      - name: Terraform init
        working-directory: infra/terraform/aws
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform/aws
        run: terraform validate

      - name: Terraform security scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: infra/terraform
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Kubernetes manifest scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: deploy/kubernetes
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Docker image vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
