<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuantGrid</title>
    <style>
      :root {
        color: #f8fafc;
        background: #020617;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(20, 184, 166, 0.12), transparent 34rem),
          #020617;
      }

      .boot-screen {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .boot-card {
        width: min(420px, 100%);
        border: 1px solid rgba(20, 184, 166, 0.35);
        border-radius: 8px;
        background: #0f172a;
        padding: 24px;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.35);
      }

      .boot-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }

      .boot-mark {
        display: inline-grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border: 1px solid rgba(45, 212, 191, 0.45);
        border-radius: 8px;
        background: #042f2e;
        color: #99f6e4;
        font-size: 13px;
        font-weight: 800;
      }

      .boot-card strong {
        display: block;
        font-size: 18px;
      }

      .boot-card p {
        margin: 0;
        color: #94a3b8;
        font-size: 14px;
        line-height: 1.6;
      }

      .boot-loader {
        position: relative;
        height: 4px;
        margin-top: 20px;
        overflow: hidden;
        border-radius: 999px;
        background: #1e293b;
      }

      .boot-loader::after {
        position: absolute;
        inset: 0 auto 0 0;
        width: 45%;
        border-radius: inherit;
        background: #14b8a6;
        content: "";
        animation: quantgridBoot 1.2s ease-in-out infinite;
      }

      @keyframes quantgridBoot {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(230%);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-screen" role="status" aria-live="polite">
        <div class="boot-card">
          <div class="boot-brand">
            <span class="boot-mark">QG</span>
            <strong>QuantGrid</strong>
          </div>
          <p>Loading trading dashboard...</p>
          <div class="boot-loader" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
