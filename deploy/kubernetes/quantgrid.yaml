apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantgrid-backend
  labels:
    app: quantgrid-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quantgrid-backend
  template:
    metadata:
      labels:
        app: quantgrid-backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: quantgrid/backend:beta
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: QUANTGRID_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quantgrid-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: quantgrid-secrets
                  key: redis-url
            - name: QUANTGRID_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: quantgrid-secrets
                  key: auth-secret
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: quantgrid-config
                  key: cors-allowed-origins
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: quantgrid-backend
spec:
  selector:
    app: quantgrid-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
