apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantgrid-backend
  labels:
    app: quantgrid-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quantgrid-backend
  template:
    metadata:
      labels:
        app: quantgrid-backend
    spec:
      serviceAccountName: quantgrid-backend
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: backend
          image: quantgrid/backend:beta
          # NOTE: this repo's CI (.github/workflows/ci.yml, security.yml) never actually
          # builds or pushes a tagged image -- "beta" is presumably built/pushed by some
          # process outside this repo. Combined with a mutable tag, `imagePullPolicy:
          # IfNotPresent` means different nodes can end up running DIFFERENT actual image
          # content under the identical tag "beta" -- whichever version each node happened to
          # have cached locally the last time it pulled -- causing silent version skew across
          # replicas, and there's no way to roll back to a specific known-good version since
          # "beta" always means "whatever was last pushed." `imagePullPolicy: Always` is the
          # safe minimum fix given a mutable tag; the real fix is having CI build and push an
          # immutable tag (e.g. the git commit SHA) and referencing that here instead.
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: QUANTGRID_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quantgrid-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: quantgrid-secrets
                  key: redis-url
            - name: QUANTGRID_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: quantgrid-secrets
                  key: auth-secret
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: quantgrid-config
                  key: cors-allowed-origins
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: app-data
              mountPath: /app/services/trading-service/Backend/data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: app-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: quantgrid-backend
spec:
  selector:
    app: quantgrid-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: quantgrid-backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quantgrid-backend-read
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quantgrid-backend-read
subjects:
  - kind: ServiceAccount
    name: quantgrid-backend
roleRef:
  kind: Role
  name: quantgrid-backend-read
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: quantgrid-backend-ingress
spec:
  podSelector:
    matchLabels:
      app: quantgrid-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
