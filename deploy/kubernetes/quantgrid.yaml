apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantgrid-backend
  labels:
    app: quantgrid-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quantgrid-backend
  template:
    metadata:
      labels:
        app: quantgrid-backend
    spec:
      serviceAccountName: quantgrid-backend
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: backend
          image: quantgrid/backend:beta
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: QUANTGRID_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quantgrid-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: quantgrid-secrets
                  key: redis-url
            - name: QUANTGRID_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: quantgrid-secrets
                  key: auth-secret
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: quantgrid-config
                  key: cors-allowed-origins
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: app-data
              mountPath: /app/services/trading-service/Backend/data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: app-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: quantgrid-backend
spec:
  selector:
    app: quantgrid-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: quantgrid-backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quantgrid-backend-read
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quantgrid-backend-read
subjects:
  - kind: ServiceAccount
    name: quantgrid-backend
roleRef:
  kind: Role
  name: quantgrid-backend-read
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: quantgrid-backend-ingress
spec:
  podSelector:
    matchLabels:
      app: quantgrid-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
