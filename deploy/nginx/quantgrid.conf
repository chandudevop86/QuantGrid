server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    server_name quantgrid.info www.quantgrid.info;

    root /var/www/quantgrid;
    index index.html;
    client_max_body_size 20m;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://quantgrid.info$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name quantgrid.info www.quantgrid.info;

    ssl_certificate /etc/letsencrypt/live/quantgrid.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quantgrid.info/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/quantgrid;
    index index.html;

    client_max_body_size 20m;
    server_tokens off;

    proxy_headers_hash_max_size 1024;
    proxy_headers_hash_bucket_size 128;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}